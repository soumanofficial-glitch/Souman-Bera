<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jayotu Capital | India's Trusted Loan Partner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            colors: {
              brand: {
                950: '#020617',
                900: '#0f172a',
                800: '#1e293b',
                700: '#334155',
                gold: '#d97706',
                'gold-light': '#fbbf24',
                emerald: '#059669',
              }
            },
            animation: {
              'blob': 'blob 7s infinite',
              'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
              'shimmer': 'shimmer 2s linear infinite',
              'marquee': 'marquee 30s linear infinite',
              'shine': 'shine 1.5s ease-out infinite',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              shimmer: {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' },
              },
              marquee: {
                '0%': { transform: 'translateX(0%)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              shine: {
                '100%': { left: '125%' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; scroll-behavior: smooth; }
      .bg-grid-pattern { background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px); background-size: 40px 40px; }
      .gradient-text { background: linear-gradient(to right, #ffffff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      .gold-gradient { background: linear-gradient(135deg, #b45309 0%, #d97706 50%, #f59e0b 100%); }
      .gold-text-gradient { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
      .glass-card-dark { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #f1f1f1; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@19.2.3';
        import ReactDOM from 'https://esm.sh/react-dom@19.2.3/client';
        import { 
            Menu, X, ShieldCheck, ArrowRight, CheckCircle, User, 
            Briefcase, Home, RefreshCw, ChevronLeft, 
            AlertCircle, Lock, Building2, TrendingUp, BadgeCheck, Smartphone, Car,
            Check, Calculator, PieChart, Star, Shield, TrendingDown, Percent, Clock, Layers, MousePointerClick, FileCheck, FileText, UserCheck, Truck, Coins, Quote, MapPin
        } from 'https://esm.sh/lucide-react@0.463.0';

        // --- LeadForm Component ---
        const LeadForm = () => {
            const initialFormData = {
                loanType: 'Personal Loan', employmentType: 'Salaried (Private)', incomeRange: 'Above ₹50,000',
                cibilScore: '750+', loanAmount: '', hasOngoingLoans: 'No', totalMonthlyEmis: '',
                hasDefaults: 'No', fullName: '', mobile: '', email: '', consent: false
            };
            const loanOptions = [
                { type: 'Personal Loan', rate: '9.97%', icon: User, color: 'text-blue-600', bg: 'bg-blue-50' },
                { type: 'Home Loan', rate: '7.35%', icon: Home, color: 'text-green-600', bg: 'bg-green-50' },
                { type: 'Loan Against Property', rate: '9.5%', icon: Building2, color: 'text-purple-600', bg: 'bg-purple-50' },
                { type: 'Business Loan', rate: '9.97%', icon: Briefcase, color: 'text-amber-600', bg: 'bg-amber-50' },
                { type: 'Car Loan', rate: '8.75%', icon: Car, color: 'text-red-600', bg: 'bg-red-50' },
            ];
            const [step, setStep] = useState(1);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isSuccess, setIsSuccess] = useState(false);
            const [isRejected, setIsRejected] = useState(false);
            const [rejectionReason, setRejectionReason] = useState('');
            const [formData, setFormData] = useState(initialFormData);

            const handleNext = () => {
                // Validation for each step (Compulsory fields)
                if (step === 1 && !formData.loanType) {
                    alert("Please select a loan type."); return;
                }
                if (step === 2) {
                    if (!formData.employmentType || !formData.incomeRange || !formData.cibilScore) {
                        alert("Please fill all fields."); return;
                    }
                    if (formData.cibilScore === 'Below 650' || formData.cibilScore === '650-699') {
                        setRejectionReason("Currently, we process applications for applicants with a CIBIL score of 700 or above.");
                        setIsRejected(true); return;
                    }
                    if (formData.incomeRange === 'Below ₹25,000') {
                        setRejectionReason("We currently require a minimum monthly income of ₹25,000 to proceed with bank partners.");
                        setIsRejected(true); return;
                    }
                }
                if (step === 3) {
                    if (!formData.loanAmount || !formData.fullName) {
                        alert("Please fill all fields."); return;
                    }
                    if (parseInt(formData.loanAmount) < 150000) {
                        setRejectionReason("Minimum loan requirement is ₹1.5 Lakhs (₹1,50,000).");
                        setIsRejected(true); return;
                    }
                }
                if (step === 4) {
                    if (!formData.hasOngoingLoans || !formData.hasDefaults) {
                        alert("Please fill all fields."); return;
                    }
                    if (formData.hasDefaults === 'Yes') {
                        setRejectionReason("We are unable to process applications with recent payment defaults.");
                        setIsRejected(true); return;
                    }
                }
                if (step === 5) {
                    if (!formData.mobile || !formData.email) {
                        alert("Please fill all fields."); return;
                    }
                    if (formData.mobile.length !== 10) {
                        alert("Please enter a valid 10-digit mobile number."); return;
                    }
                }

                if (step < 5) setStep(step + 1); else handleSubmit();
            };

            const handleSubmit = async () => {
                if (!formData.consent) { alert("Please accept the terms to proceed."); return; }
                setIsSubmitting(true);
                
                try {
                    const submissionData = {
                        ...formData,
                        timestamp: new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' }),
                        source: window.location.href
                    };

                    const scriptURL = 'https://script.google.com/macros/s/AKfycbzA-OQhhOCa3eEB3QXY3xJ6i3IMmzqHdkqMCQ8ws9T7W_FATpcwUDf--3dS3lv9o0CQ/exec';
                    
                    const iframe = document.createElement('iframe');
                    iframe.name = 'hidden_iframe';
                    iframe.style.display = 'none';
                    document.body.appendChild(iframe);

                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = scriptURL;
                    form.target = 'hidden_iframe';

                    Object.keys(submissionData).forEach(key => {
                        const input = document.createElement('input');
                        input.type = 'hidden';
                        input.name = key;
                        input.value = submissionData[key];
                        form.appendChild(input);
                    });

                    document.body.appendChild(form);
                    form.submit();

                    setTimeout(() => {
                        document.body.removeChild(form);
                        document.body.removeChild(iframe);
                        setIsSubmitting(false);
                        setIsSuccess(true);
                    }, 1500);

                } catch (error) {
                    console.error("Submission error:", error);
                    alert("There was an error submitting your application. Please try again.");
                    setIsSubmitting(false);
                }
            };

            const updateField = (f, v) => setFormData(p => ({ ...p, [f]: v }));

            if (isRejected) return (
                <div className="bg-white rounded-2xl shadow-2xl p-8 border-t-4 border-red-500 text-center flex flex-col items-center justify-center animate-fade-in">
                    <AlertCircle className="w-16 h-16 text-red-500 mb-4" />
                    <h3 className="text-xl font-bold mb-2">We couldn't proceed</h3>
                    <p className="text-gray-600 mb-6">{rejectionReason}</p>
                </div>
            );

            if (isSuccess) return (
                <div className="bg-white rounded-2xl shadow-2xl p-8 border-t-4 border-brand-gold text-center flex flex-col items-center justify-center animate-fade-in">
                    <CheckCircle className="w-20 h-20 text-green-600 mb-6 animate-bounce" />
                    <h3 className="text-2xl font-serif font-bold text-brand-900 mb-2">Application Received!</h3>
                    <p className="text-gray-600 mb-6">Thank you <strong>{formData.fullName}</strong>. Our manager will call you within 15 minutes.</p>
                    <button onClick={() => { setIsSuccess(false); setStep(1); setFormData(initialFormData); }} className="text-gray-400 text-sm">Start New Application</button>
                </div>
            );

            return (
                <div id="lead-form" className="bg-white rounded-2xl shadow-2xl overflow-hidden border border-gray-100 flex flex-col min-h-[500px]">
                    <div className="bg-brand-950 p-4 text-white flex justify-between items-center">
                        <div className="flex items-center gap-2"><ShieldCheck className="w-5 h-5 text-brand-gold" /><span className="text-sm font-semibold">Eligibility Check</span></div>
                        <span className="text-xs text-gray-400">Step {step} of 5</span>
                    </div>
                    <div className="p-6 flex-1">
                        <div className="w-full bg-gray-100 h-2 rounded-full mb-8 overflow-hidden">
                            <div className="bg-brand-gold h-full transition-all duration-500" style={{ width: `${(step / 5) * 100}%` }}></div>
                        </div>
                        {step === 1 && (
                            <div className="animate-fade-in-up">
                                <h3 className="text-2xl font-serif font-bold text-brand-900 mb-6">Select Loan Requirement</h3>
                                <div className="grid grid-cols-1 gap-3">
                                    {loanOptions.map(o => (
                                        <button key={o.type} onClick={() => { updateField('loanType', o.type); setStep(2); }} className={`p-4 rounded-xl border-2 flex items-center justify-between transition-all hover:border-brand-gold/50 ${formData.loanType === o.type ? 'border-brand-gold bg-brand-gold/5' : 'border-gray-100 bg-white'}`}>
                                            <div className="flex items-center gap-4">
                                                <div className={`p-3 rounded-full ${o.bg} ${o.color}`}><o.icon size={24} /></div>
                                                <div className="text-left"><span className="block font-bold text-lg">{o.type}</span><span className="text-xs font-semibold text-gray-500">Starting @ <span className="text-brand-gold">{o.rate}</span></span></div>
                                            </div>
                                            <ArrowRight size={20} className="text-gray-300" />
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                        {step === 2 && (
                            <div className="animate-fade-in-up">
                                <h3 className="text-2xl font-serif font-bold text-brand-900 mb-6">Basic Details</h3>
                                <div className="space-y-6">
                                    <div><label className="block text-sm font-bold mb-2">Employment</label><select value={formData.employmentType} onChange={e => updateField('employmentType', e.target.value)} className="w-full p-3 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-brand-gold outline-none"><option>Salaried (Private)</option><option>Salaried (Govt)</option><option>Self-Employed Business</option></select></div>
                                    <div><label className="block text-sm font-bold mb-2">Monthly Income</label><div className="grid grid-cols-2 gap-3">{['Above ₹50,000', '₹35,000 - ₹50,000', '₹25,000 - ₹35,000', 'Below ₹25,000'].map(r => <button key={r} onClick={() => updateField('incomeRange', r)} className={`py-2 px-3 text-sm rounded-lg border transition-all ${formData.incomeRange === r ? 'bg-brand-900 text-white border-brand-900' : 'bg-white text-gray-600 border-gray-200 hover:border-brand-900'}`}>{r}</button>)}</div></div>
                                    <div><label className="block text-sm font-bold mb-2">CIBIL Score</label><div className="grid grid-cols-4 gap-2">{['750+', '700-749', '650-699', 'Below 650'].map(s => <button key={s} onClick={() => updateField('cibilScore', s)} className={`py-2 px-1 text-xs rounded-lg border transition-all ${formData.cibilScore === s ? 'bg-brand-gold text-white border-brand-gold' : 'bg-white text-gray-600 border-gray-200 hover:border-brand-gold'}`}>{s}</button>)}</div></div>
                                </div>
                            </div>
                        )}
                        {step === 3 && (
                            <div className="animate-fade-in-up">
                                <h3 className="text-2xl font-serif font-bold text-brand-900 mb-6">{formData.loanType} Details</h3>
                                <div className="space-y-4">
                                    <div><label className="block text-xs font-bold text-gray-500 mb-1 uppercase tracking-wider">Loan Amount Required (Min ₹1.5L)</label><input type="number" placeholder="e.g. 500000" min="150000" value={formData.loanAmount} onChange={e => updateField('loanAmount', e.target.value)} className="w-full p-3 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-brand-gold outline-none" /></div>
                                    <div><label className="block text-xs font-bold text-gray-500 mb-1 uppercase tracking-wider">Full Name (As per PAN)</label><input type="text" placeholder="Your Name" value={formData.fullName} onChange={e => updateField('fullName', e.target.value)} className="w-full p-3 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-brand-gold outline-none" /></div>
                                </div>
                            </div>
                        )}
                        {step === 4 && (
                            <div className="animate-fade-in-up">
                                <h3 className="text-2xl font-serif font-bold text-brand-900 mb-6">Financial Health</h3>
                                <div className="space-y-6">
                                    <div><label className="block text-sm font-bold mb-3">Any Ongoing Loans?</label><div className="flex gap-4">{['Yes', 'No'].map(o => <button key={o} onClick={() => updateField('hasOngoingLoans', o)} className={`flex-1 py-3 rounded-lg border font-semibold transition-all ${formData.hasOngoingLoans === o ? 'bg-brand-900 text-white border-brand-900' : 'bg-white text-gray-600 border-gray-200'}`}>{o}</button>)}</div></div>
                                    <div><label className="block text-sm font-bold mb-3">Any Defaults in last 2 years?</label><div className="flex gap-4">{['Yes', 'No'].map(o => <button key={o} onClick={() => updateField('hasDefaults', o)} className={`flex-1 py-3 rounded-lg border font-semibold transition-all ${formData.hasDefaults === o ? 'bg-red-50 text-red-600 border-red-200' : 'bg-green-50 text-green-700 border-green-200'}`}>{o}</button>)}</div></div>
                                </div>
                            </div>
                        )}
                        {step === 5 && (
                            <div className="animate-fade-in-up">
                                <h3 className="text-2xl font-serif font-bold text-brand-900 mb-6">Contact Info</h3>
                                <div className="space-y-4">
                                    <div><label className="block text-xs font-bold text-gray-500 mb-1 uppercase tracking-wider">Mobile Number</label><input type="tel" maxLength={10} placeholder="10-digit mobile number" value={formData.mobile} onChange={e => updateField('mobile', e.target.value)} className="w-full p-3 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-brand-gold outline-none" /></div>
                                    <div><label className="block text-xs font-bold text-gray-500 mb-1 uppercase tracking-wider">Email Address</label><input type="email" placeholder="name@example.com" value={formData.email} onChange={e => updateField('email', e.target.value)} className="w-full p-3 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-brand-gold outline-none" /></div>
                                    <div className="flex items-start gap-3 mt-4 bg-gray-50 p-4 rounded-xl border border-gray-100"><input type="checkbox" className="mt-1 w-4 h-4 accent-brand-gold" checked={formData.consent} onChange={e => updateField('consent', e.target.checked)} /><label className="text-xs text-gray-500 leading-relaxed">I authorize Jayotu Capital and its partners to contact me via Call/SMS/WhatsApp for this application. I agree to the Privacy Policy.</label></div>
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="p-6 bg-gray-50 border-t flex justify-between items-center">
                        {step > 1 ? <button onClick={() => setStep(step - 1)} className="text-gray-500 font-semibold flex items-center gap-1 hover:text-brand-900 transition-colors"><ChevronLeft size={18} /> Back</button> : <div></div>}
                        <button onClick={handleNext} disabled={isSubmitting || (step === 5 && !formData.consent)} className={`px-8 py-3 rounded-xl font-bold text-white shadow-lg transition-all transform active:scale-95 ${isSubmitting || (step === 5 && !formData.consent) ? 'bg-gray-400 cursor-not-allowed' : 'bg-brand-900 hover:bg-brand-800 hover:shadow-brand-900/20'}`}>{isSubmitting ? 'Processing...' : step === 5 ? 'Check Offers' : 'Next'}</button>
                    </div>
                </div>
            );
        };

        // --- Navbar Component ---
        const Navbar = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            useEffect(() => {
                const h = () => setIsScrolled(window.scrollY > 20);
                window.addEventListener('scroll', h); return () => window.removeEventListener('scroll', h);
            }, []);
            return (
                <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-white/90 backdrop-blur-md shadow-md py-3' : 'bg-transparent py-5'}`}>
                    <div className="max-w-7xl mx-auto px-4 flex justify-between items-center">
                        <div className="flex items-center space-x-2 cursor-pointer" onClick={() => window.scrollTo(0, 0)}>
                            <div className="bg-brand-900 p-2 rounded-lg shadow-lg shadow-brand-900/20"><ShieldCheck className="w-6 h-6 text-white" /></div>
                            <span className={`text-2xl font-bold font-serif ${isScrolled ? 'text-brand-900' : 'text-brand-900 lg:text-white'}`}>Jayotu Capital</span>
                        </div>
                        <div className="hidden md:flex items-center space-x-8">
                            {['Services', 'Partners', 'Process', 'Reviews'].map(i => <a key={i} href={`#${i.toLowerCase()}`} className={`text-sm font-medium transition-colors hover:text-brand-gold ${isScrolled ? 'text-gray-700' : 'text-gray-200'}`}>{i}</a>)}
                            <button onClick={() => document.getElementById('lead-form')?.scrollIntoView({ behavior: 'smooth' })} className="bg-brand-gold hover:bg-brand-gold/90 text-white px-6 py-2.5 rounded-full font-semibold text-sm shadow-lg shadow-brand-gold/20 transition-all transform hover:scale-105">Check Eligibility</button>
                        </div>
                        <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className={`md:hidden ${isScrolled ? 'text-gray-800' : 'text-white'}`}>{mobileMenuOpen ? <X size={28} /> : <Menu size={28} />}</button>
                    </div>
                    {/* Mobile Menu */}
                    {mobileMenuOpen && (
                        <div className="md:hidden absolute top-full left-0 w-full bg-white shadow-2xl border-t border-gray-100 p-6 flex flex-col gap-4 animate-fade-in">
                            {['Services', 'Partners', 'Process', 'Reviews'].map(i => <a key={i} href={`#${i.toLowerCase()}`} onClick={() => setMobileMenuOpen(false)} className="text-gray-800 font-semibold py-2 border-b border-gray-50">{i}</a>)}
                            <button onClick={() => { setMobileMenuOpen(false); document.getElementById('lead-form')?.scrollIntoView({ behavior: 'smooth' }); }} className="bg-brand-gold text-white font-bold py-4 rounded-xl mt-2">Get Started Now</button>
                        </div>
                    )}
                </nav>
            );
        };

        // --- Hero Component ---
        const Hero = () => (
            <section className="relative w-full min-h-screen bg-brand-950 pt-28 pb-16 overflow-hidden flex items-center">
                <div className="absolute inset-0 bg-grid-pattern opacity-20"></div>
                <div className="absolute top-1/4 -left-20 w-96 h-96 bg-brand-gold/10 rounded-full blur-3xl animate-blob"></div>
                <div className="absolute bottom-1/4 -right-20 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl animate-blob" style={{ animationDelay: '2s' }}></div>
                <div className="max-w-7xl mx-auto px-4 relative z-10 w-full grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
                    <div className="lg:col-span-7 text-center lg:text-left space-y-8 animate-fade-in-up">
                        <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-white/10 text-brand-gold-light text-sm font-semibold"><Star size={16} fill="currentColor" /><span>#1 Trusted DSA Partner in India</span></div>
                        <h1 className="text-5xl lg:text-7xl font-serif font-bold text-white leading-tight">Instant Loans from <br /><span className="gold-text-gradient">India’s Top Banks and NBFC's</span></h1>
                        <div className="flex flex-wrap justify-center lg:justify-start gap-6 text-sm font-bold tracking-wide uppercase">
                            <div className="flex items-center gap-2 text-brand-gold-light">
                                <span className="text-gray-400 font-medium normal-case">Min. Salary:</span> ₹25,000
                            </div>
                            <div className="hidden lg:block w-px h-4 bg-white/10"></div>
                            <div className="flex items-center gap-2 text-brand-gold-light">
                                <span className="text-gray-400 font-medium normal-case">Min. Loan:</span> ₹1.5 Lakh
                            </div>
                        </div>
                        <p className="text-lg text-gray-300 max-w-2xl mx-auto lg:mx-0 leading-relaxed">Unlock the best financial deals with Jayotu Capital. We bridge the gap between you and India's leading financial institutions. Personal & Business Loans @ <span className="text-brand-gold-light font-bold text-2xl">9.97%*</span></p>
                        <div className="flex flex-wrap justify-center lg:justify-start gap-4">
                            {['Disbursal in 24 Hrs', 'Lowest Rates', '100% Secure'].map(f => <div key={f} className="flex items-center gap-2 px-4 py-2 rounded-lg bg-white/5 border border-white/5 text-gray-200 text-sm"><CheckCircle className="text-emerald-400" size={16} />{f}</div>)}
                        </div>
                        <div className="pt-4">
                            <button onClick={() => document.getElementById('lead-form')?.scrollIntoView({ behavior: 'smooth' })} className="bg-brand-gold hover:bg-brand-gold/90 text-white px-10 py-4 rounded-full font-bold text-lg shadow-2xl shadow-brand-gold/20 transition-all transform hover:scale-105 active:scale-95">Get Started Now</button>
                        </div>
                    </div>
                    <div className="lg:col-span-5"><LeadForm /></div>
                </div>
            </section>
        );

        // --- TrustStrip Component ---
        const TrustStrip = () => {
            const partners = [
                "HDFC Bank", "ICICI Bank", "SBI", "Axis Bank", "Kotak Mahindra", "IDFC First", "Yes Bank", "IndusInd Bank",
                "Bajaj Finserv", "Tata Capital", "L&T Finance", "Aditya Birla Capital", "Muthoot Finance", "Cholamandalam", "Mahindra Finance", "Shriram Finance"
            ];
            return (
                <section id="partners" className="py-12 bg-white border-b overflow-hidden">
                    <p className="text-center text-xs font-bold text-gray-400 uppercase tracking-widest mb-8">Our Direct Banking and NBFC Partners</p>
                    <div className="flex animate-marquee whitespace-nowrap items-center">
                        {[...partners, ...partners].map((p, i) => (
                            <div key={i} className="mx-12 flex h-16 items-center justify-center transition-all opacity-60 hover:opacity-100">
                                <span className="text-xl font-bold text-brand-900 font-serif tracking-tight">{p}</span>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        // --- Features Component ---
        const Features = () => {
            const f = [
                { i: MousePointerClick, t: "100% Digital", d: "No physical branch visits. Complete your application from the comfort of your home." },
                { i: Layers, t: "Compare 20+ Banks", d: "Our AI-driven system finds the perfect bank match for your profile and needs." },
                { i: Percent, t: "Lowest Rates", d: "Benefit from our direct partnerships to get the most competitive interest rates." },
                { i: ShieldCheck, t: "Zero Hidden Charges", d: "Transparent processing with no surprises. What you see is what you get." },
                { i: Clock, t: "Quick Disbursal", d: "Get funds credited to your account within 24-48 hours of final approval." },
                { i: FileCheck, t: "High Approval", d: "We pre-screen applications to ensure they go to banks with the highest approval odds." }
            ];
            return (
                <section id="services" className="py-24 bg-white">
                    <div className="max-w-7xl mx-auto px-4 text-center mb-16">
                        <span className="text-brand-gold font-bold text-xs uppercase mb-2 block tracking-widest">Why Choose Us</span>
                        <h2 className="text-4xl font-serif font-bold text-brand-900 mb-4">Smart Financing for Smart Indians</h2>
                        <p className="text-gray-500 max-w-2xl mx-auto">We combine technology with financial expertise to deliver a seamless loan experience.</p>
                    </div>
                    <div className="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8">
                        {f.map((item, i) => (
                            <div key={i} className="p-8 rounded-2xl border border-gray-100 shadow-xl shadow-gray-200/50 hover:-translate-y-2 transition-all duration-300 bg-white group">
                                <div className="w-16 h-16 rounded-xl bg-gray-50 flex items-center justify-center mb-6 group-hover:bg-brand-900 transition-colors"><item.i className="w-8 h-8 text-brand-900 group-hover:text-white transition-colors" /></div>
                                <h3 className="text-xl font-bold text-brand-900 mb-3">{item.t}</h3>
                                <p className="text-gray-600 text-sm leading-relaxed">{item.d}</p>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        // --- LoanProducts Component ---
        const LoanProducts = () => {
            const p = [
                { t: "Personal Loan", i: User, a: "Up to ₹40L", r: "From 9.97%", c: "bg-blue-50" },
                { t: "Business Loan", i: Briefcase, a: "Up to ₹5Cr", r: "From 9.97%", c: "bg-amber-50" },
                { t: "MSME Loan", i: TrendingUp, a: "Up to ₹2Cr", r: "Competitive", c: "bg-emerald-50" },
                { t: "LAP", i: Home, a: "Up to ₹10Cr", r: "From 8.50%", c: "bg-indigo-50" }
            ];

            // EMI Calculator State
            const [calcType, setCalcType] = useState('personal');
            const [amount, setAmount] = useState(500000);
            const [rate, setRate] = useState(9.97);
            const [years, setYears] = useState(3);

            useEffect(() => {
                if (calcType === 'personal') {
                    setAmount(500000);
                    setRate(9.97);
                    setYears(3);
                } else {
                    setAmount(3000000);
                    setRate(7.35);
                    setYears(20);
                }
            }, [calcType]);

            const monthlyRate = rate / 12 / 100;
            const months = years * 12;
            const emi = (amount * monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);
            const totalAmount = emi * months;
            const totalInterest = totalAmount - amount;

            const formatCurrency = (val) => {
                return new Intl.NumberFormat('en-IN', {
                    style: 'currency',
                    currency: 'INR',
                    maximumFractionDigits: 0
                }).format(val);
            };

            return (
                <section className="py-20 bg-gray-50" id="products">
                    <div className="max-w-7xl mx-auto px-4 text-center mb-12">
                        <span className="text-brand-gold font-bold text-xs uppercase mb-2 block tracking-widest">Financial Solutions</span>
                        <h2 className="text-4xl font-serif font-bold text-brand-900">Choose the Right Loan</h2>
                    </div>
                    <div className="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-4 gap-6 mb-20">
                        {p.map((item, i) => (
                            <div key={i} className="bg-white rounded-2xl p-6 shadow-md border-t-4 border-brand-900 hover:shadow-xl transition-all">
                                <div className={`w-12 h-12 rounded-lg ${item.c} flex items-center justify-center mb-6`}><item.i className="w-6 h-6 text-brand-900" /></div>
                                <h3 className="text-xl font-bold mb-2">{item.t}</h3>
                                <p className="text-2xl font-bold text-brand-gold">{item.a}</p>
                                <p className="text-sm text-gray-500 mb-8">{item.r}</p>
                                <button onClick={() => document.getElementById('lead-form')?.scrollIntoView({ behavior: 'smooth' })} className="w-full py-3 border border-brand-900 text-brand-900 font-semibold rounded-lg hover:bg-brand-900 hover:text-white transition-all">Apply Now</button>
                            </div>
                        ))}
                    </div>

                    {/* EMI Calculator Section */}
                    <div className="max-w-5xl mx-auto px-4">
                        <div className="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
                            <div className="bg-brand-900 p-8 text-white flex flex-col md:flex-row justify-between items-center gap-6">
                                <div className="flex items-center gap-4">
                                    <div className="bg-brand-gold/20 p-3 rounded-2xl">
                                        <Calculator className="w-8 h-8 text-brand-gold-light" />
                                    </div>
                                    <div>
                                        <h3 className="text-2xl font-serif font-bold">EMI Calculator</h3>
                                        <p className="text-gray-400 text-sm">Plan your monthly budget easily</p>
                                    </div>
                                </div>
                                <div className="flex bg-white/10 p-1 rounded-xl">
                                    <button 
                                        onClick={() => setCalcType('personal')}
                                        className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${calcType === 'personal' ? 'bg-brand-gold text-white shadow-lg' : 'text-gray-300 hover:text-white'}`}
                                    >Personal Loan</button>
                                    <button 
                                        onClick={() => setCalcType('home')}
                                        className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${calcType === 'home' ? 'bg-brand-gold text-white shadow-lg' : 'text-gray-300 hover:text-white'}`}
                                    >Home Loan</button>
                                </div>
                            </div>

                            <div className="p-8 md:p-12 grid grid-cols-1 lg:grid-cols-2 gap-12">
                                <div className="space-y-10">
                                    {/* Amount Slider */}
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center">
                                            <label className="text-gray-700 font-bold">Loan Amount</label>
                                            <span className="text-brand-900 font-extrabold text-lg bg-gray-100 px-4 py-1 rounded-lg">{formatCurrency(amount)}</span>
                                        </div>
                                        <input 
                                            type="range" 
                                            min={calcType === 'personal' ? 50000 : 500000} 
                                            max={calcType === 'personal' ? 5000000 : 100000000} 
                                            step={calcType === 'personal' ? 10000 : 100000}
                                            value={amount}
                                            onChange={(e) => setAmount(Number(e.target.value))}
                                            className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-brand-gold"
                                        />
                                        <div className="flex justify-between text-xs text-gray-400 font-bold">
                                            <span>{formatCurrency(calcType === 'personal' ? 50000 : 500000)}</span>
                                            <span>{formatCurrency(calcType === 'personal' ? 5000000 : 100000000)}</span>
                                        </div>
                                    </div>

                                    {/* Interest Rate Slider */}
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center">
                                            <label className="text-gray-700 font-bold">Interest Rate (% p.a.)</label>
                                            <span className="text-brand-900 font-extrabold text-lg bg-gray-100 px-4 py-1 rounded-lg">{rate}%</span>
                                        </div>
                                        <input 
                                            type="range" 
                                            min={7} 
                                            max={24} 
                                            step={0.05}
                                            value={rate}
                                            onChange={(e) => setRate(Number(e.target.value))}
                                            className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-brand-gold"
                                        />
                                        <div className="flex justify-between text-xs text-gray-400 font-bold">
                                            <span>7%</span>
                                            <span>24%</span>
                                        </div>
                                    </div>

                                    {/* Tenure Slider */}
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center">
                                            <label className="text-gray-700 font-bold">Tenure (Years)</label>
                                            <span className="text-brand-900 font-extrabold text-lg bg-gray-100 px-4 py-1 rounded-lg">{years} Years</span>
                                        </div>
                                        <input 
                                            type="range" 
                                            min={1} 
                                            max={calcType === 'personal' ? 7 : 30} 
                                            step={1}
                                            value={years}
                                            onChange={(e) => setYears(Number(e.target.value))}
                                            className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-brand-gold"
                                        />
                                        <div className="flex justify-between text-xs text-gray-400 font-bold">
                                            <span>1 Year</span>
                                            <span>{calcType === 'personal' ? 7 : 30} Years</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-gray-50 rounded-3xl p-8 border border-gray-100 flex flex-col justify-between">
                                    <div className="text-center space-y-2 mb-8">
                                        <p className="text-gray-500 text-sm font-bold uppercase tracking-widest">Monthly EMI</p>
                                        <p className="text-5xl font-serif font-bold text-brand-900">{formatCurrency(Math.round(emi))}</p>
                                    </div>
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center py-4 border-b border-gray-200">
                                            <span className="text-gray-600 flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-brand-900"></div> Principal Amount</span>
                                            <span className="font-bold text-gray-900">{formatCurrency(amount)}</span>
                                        </div>
                                        <div className="flex justify-between items-center py-4 border-b border-gray-200">
                                            <span className="text-gray-600 flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-brand-gold"></div> Total Interest</span>
                                            <span className="font-bold text-gray-900">{formatCurrency(Math.round(totalInterest))}</span>
                                        </div>
                                        <div className="flex justify-between items-center py-4">
                                            <span className="text-gray-900 font-bold">Total Payable</span>
                                            <span className="font-extrabold text-xl text-brand-900">{formatCurrency(Math.round(totalAmount))}</span>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => document.getElementById('lead-form')?.scrollIntoView({ behavior: 'smooth' })}
                                        className="w-full mt-8 bg-brand-gold hover:bg-brand-gold/90 text-white py-4 rounded-xl font-bold shadow-xl shadow-brand-gold/20 transition-all flex items-center justify-center gap-2 group"
                                    >
                                        Check Eligibility for {formatCurrency(amount)} <ArrowRight className="group-hover:translate-x-1 transition-transform" size={20} />
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // --- ProcessStep Component ---
        const ProcessStep = () => {
            const s = [
                { n: "01", i: FileText, t: "Eligibility", d: "Fill the simple form in 2 minutes." },
                { n: "02", i: UserCheck, t: "Bank Offers", d: "We fetch best quotes from our partners." },
                { n: "03", i: Truck, t: "KYC", d: "Digital verification or doorstep pickup." },
                { n: "04", i: Coins, t: "Disbursed", d: "Direct credit to your bank account." }
            ];
            return (
                <section id="process" className="py-24 bg-white">
                    <div className="max-w-7xl mx-auto px-4 text-center mb-20"><h2 className="text-4xl font-serif font-bold text-brand-900">Hassle-Free 4 Step Process</h2></div>
                    <div className="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-4 gap-8">
                        {s.map((step, i) => (
                            <div key={i} className="flex flex-col items-center text-center group">
                                <div className="w-20 h-20 rounded-full bg-white shadow-xl flex items-center justify-center mb-8 relative group-hover:scale-110 transition-transform">
                                    <step.i className="w-8 h-8 text-brand-900" />
                                    <div className="absolute -top-2 -right-2 w-8 h-8 rounded-full bg-brand-900 text-white flex items-center justify-center text-sm font-bold shadow-lg">{step.n}</div>
                                </div>
                                <h3 className="text-xl font-bold text-brand-900 mb-3">{step.t}</h3>
                                <p className="text-sm text-gray-500 leading-relaxed">{step.d}</p>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        // --- Testimonials Component ---
        const Testimonials = () => {
            const r = [
                { n: "Amit Sharma", l: "Delhi", t: "Jayotu Capital got me an offer from HDFC within 4 hours. Smooth process and very professional staff.", i: "https://picsum.photos/id/1012/100/100" },
                { n: "Pooja Verma", l: "Mumbai", t: "Transparent comparison of 3 banks. I chose ICICI for 10.5%. Highly recommended for anyone looking for quick loans.", i: "https://picsum.photos/id/338/100/100" }
            ];
            return (
                <section id="reviews" className="py-24 bg-brand-900 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-full bg-grid-pattern opacity-10"></div>
                    <div className="max-w-7xl mx-auto px-4 text-center mb-16 relative z-10"><h2 className="text-3xl md:text-5xl font-serif font-bold text-white">Stories of Success</h2></div>
                    <div className="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-2 gap-8 relative z-10">
                        {r.map((rev, i) => (
                            <div key={i} className="glass-card-dark rounded-2xl p-8 hover:bg-white/10 transition-colors">
                                <Quote className="text-brand-gold/20 w-12 h-12 mb-4" />
                                <p className="text-gray-300 italic mb-8 leading-relaxed">"{rev.t}"</p>
                                <div className="flex items-center gap-4 pt-6 border-t border-white/10">
                                    <img src={rev.i} className="w-12 h-12 rounded-full border-2 border-brand-gold/50" referrerPolicy="no-referrer" />
                                    <div><h4 className="font-bold text-white">{rev.n}</h4><div className="text-xs text-gray-400">{rev.l}</div></div>
                                </div>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        // --- Footer Component ---
        const Footer = () => (
            <footer className="bg-gray-900 text-gray-400 py-16 border-t border-gray-800">
                <div className="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-4 gap-12 mb-12">
                    <div className="col-span-1">
                        <div className="flex items-center gap-2 mb-6 text-white">
                            <ShieldCheck className="w-8 h-8 text-brand-gold" />
                            <span className="text-2xl font-bold font-serif">Jayotu Capital</span>
                        </div>
                        <p className="text-sm leading-relaxed">India's premium financial bridge connecting borrowers with leading banks. We make borrowing simple, fast, and transparent.</p>
                    </div>
                    <div>
                        <h4 className="text-white font-bold mb-6 uppercase tracking-wider text-sm">Products</h4>
                        <ul className="space-y-3 text-sm">
                            <li onClick={() => document.getElementById('lead-form')?.scrollIntoView({ behavior: 'smooth' })} className="hover:text-white cursor-pointer transition-colors">Personal Loan</li>
                            <li onClick={() => document.getElementById('lead-form')?.scrollIntoView({ behavior: 'smooth' })} className="hover:text-white cursor-pointer transition-colors">Business Loan</li>
                            <li onClick={() => document.getElementById('lead-form')?.scrollIntoView({ behavior: 'smooth' })} className="hover:text-white cursor-pointer transition-colors">MSME Loan</li>
                            <li onClick={() => document.getElementById('lead-form')?.scrollIntoView({ behavior: 'smooth' })} className="hover:text-white cursor-pointer transition-colors">Loan Against Property</li>
                        </ul>
                    </div>
                    <div>
                        <h4 className="text-white font-bold mb-6 uppercase tracking-wider text-sm">Legal</h4>
                        <ul className="space-y-3 text-sm">
                            <li className="hover:text-white cursor-pointer transition-colors">Privacy Policy</li>
                            <li className="hover:text-white cursor-pointer transition-colors">Terms of Use</li>
                            <li className="hover:text-white cursor-pointer transition-colors">Disclaimer</li>
                        </ul>
                    </div>
                    <div>
                        <h4 className="text-white font-bold mb-6 uppercase tracking-wider text-sm">Contact</h4>
                        <ul className="space-y-4 text-sm">
                            <li className="flex items-center gap-3"><MapPin size={18} className="text-brand-gold" /> Dalhousie, Kolkata 700001</li>
                            <li className="flex items-center gap-3"><FileText size={18} className="text-brand-gold" /> support@jayotucapital.in</li>
                        </ul>
                    </div>
                </div>
                <div className="max-w-7xl mx-auto px-4 border-t border-gray-800 pt-8 text-xs text-center">
                    <p>&copy; {new Date().getFullYear()} Jayotu Capital. All Rights Reserved. | India's Trusted Loan Partner</p>
                </div>
            </footer>
        );

        // --- App Component ---
        const App = () => (
            <div className="min-h-screen bg-white">
                <Navbar />
                <Hero />
                <TrustStrip />
                <Features />
                <LoanProducts />
                <ProcessStep />
                <Testimonials />
                <div className="md:hidden fixed bottom-0 left-0 w-full bg-white border-t p-4 z-40 shadow-2xl">
                    <button onClick={() => document.getElementById('lead-form')?.scrollIntoView({ behavior: 'smooth' })} className="w-full bg-brand-gold text-white font-bold py-4 rounded-xl shadow-lg shadow-brand-gold/30 animate-pulse">Check Loan Eligibility</button>
                </div>
                <Footer />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
